services:
  - type: web
    name: propello-ai-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: VAPI_PUBLIC_KEY
        sync: false
    disk:
      name: propello-data-disk
      mountPath: /opt/render/project/src/data
      sizeGB: 1
